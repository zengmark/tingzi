<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亭子作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.85;
            font-weight: 300;
        }

        .coming-soon {
            margin-top: 3rem;
            padding: 0.8rem 2rem;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 2rem;
            display: inline-block;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>亭子作品集</h1>
        <p class="subtitle">作品正在路上...</p>
        <div class="coming-soon">Coming Soon</div>
    </div>
</body>
</html>
